version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cine
      POSTGRES_PASSWORD: cinepass
      POSTGRES_DB: cinematch
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://cine:cinepass@db:5432/cinematch
      JWT_SECRET_KEY: dev-secret
      TMDB_API_KEY: test
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: no-reply@local
      REDIS_URL: redis://redis:6379/0
      PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mailhog
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
